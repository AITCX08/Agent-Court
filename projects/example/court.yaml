# Example court — generic full-stack web project.
# Copy this directory to start your own court:
#   cp -r ~/Desktop/agent-court/projects/example ~/.agent-court/projects/<your-project>
# Then edit work_dir paths + role prompts to match.

project: example
session: court-example
attach_window: foreman

# Default LLM CLI used by each role unless overridden per-role.
# Any CLI accepting --append-system-prompt and --model works (e.g. claude, codex).
default_cli: claude

roles:
  - name: foreman
    role: project dispatcher (receives work from upstream, splits across workers)
    prompt: foreman.md
    work_dir: /path/to/your/project
    model: ""

  - name: frontend
    role: UI engineer (React / Vue / Svelte / etc.)
    prompt: frontend.md
    work_dir: /path/to/your/project/web
    model: ""

  - name: backend
    role: server engineer (API / DB / auth)
    prompt: backend.md
    work_dir: /path/to/your/project/server
    model: ""

  - name: devops
    role: infra / deploy / CI engineer
    prompt: devops.md
    work_dir: /path/to/your/project/infra
    model: ""

# Optional tmux windows that don't run an LLM (just a shell command).
utility_windows:
  - name: bus
    cmd: "tail -f ~/.agent-court/projects/example/shared/event.log"
  - name: shell
    cmd: "cd /path/to/your/project && exec $SHELL"

# ---------------------------------------------------------------------------
# Federation — inter-court networking. Default OFF.
#
# Leave this entire block commented out (or set `enabled: false`) to keep this
# project local-only. court-peer refuses to start when federation is disabled.
#
# When enabled, you must also:
#   1. Run `court-keygen <project>` to generate this project's keypair
#   2. Fill in `peers.yaml` with the other side(s) you've exchanged keys with
#   3. Start `court-peer <project>` to receive inbound messages
# ---------------------------------------------------------------------------
# federation:
#   enabled: true
#
#   # Your court_id on the network. Defaults to "<hostname>-<project>".
#   # Pick something stable; peers' peers.yaml references this string.
#   court_id: "alice-laptop-example"
#
#   # Roles outside peers may dispatch *to*. Anything not listed gets 403.
#   # Conservative default: only foreman is reachable from outside; foreman
#   # then routes work internally.
#   expose_roles:
#     - foreman
#
#   # Roles whose outboxes outside peers may read (used by PR-2 read_peer_inbox).
#   expose_read:
#     - foreman
#
#   # PR-2 will enforce these against any path referenced in inbound messages.
#   # Schema is wired in PR-1; enforcement lands with the policy engine.
#   allow_paths:
#     - "bus/foreman/inbox/**"
#     - "shared/notes-public.md"
#   deny_paths:
#     - "prompts/**"
#     - "shared/notes-private.md"
